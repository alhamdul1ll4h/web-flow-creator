name: Deploy TanStack Site to GitHub Pages

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      # ขั้นตอนนี้จะ "โชว์" ไฟล์ทั้งหมดที่เครื่องสร้างขึ้นมา
      - name: Show all files after build
        run: ls -R
